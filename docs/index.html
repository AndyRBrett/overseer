<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Project Overseer</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { font: 15px/1.55 -apple-system, system-ui, sans-serif; margin: 0;
           background: #0f172a; color: #e2e8f0;
           padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
    header { padding: 22px 18px 10px; }
    header h1 { margin: 0; font-size: 19px; }
    header .sub { color: #94a3b8; font-size: 13px; margin-top: 2px; }
    main { padding: 8px 18px 40px; max-width: 780px; margin: 0 auto; }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0 18px; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 10px 14px; flex: 1; min-width: 70px; }
    .stat .n { font-size: 22px; font-weight: 700; }
    .stat .l { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 16px; margin: 12px 0; }
    .digest { white-space: pre-wrap; word-break: break-word; font-size: 14.5px; }
    .item { border-left: 3px solid #475569; padding: 6px 0 6px 12px; margin: 8px 0; }
    .item .meta { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; }
    .item .body { font-size: 13.5px; color: #cbd5e1; }
    button { font: inherit; background: #2563eb; color: #fff; border: 0; border-radius: 10px;
             padding: 12px 16px; width: 100%; cursor: pointer; }
    button.secondary { background: #334155; }
    .muted { color: #94a3b8; font-size: 13px; }
    textarea { width: 100%; min-height: 110px; background: #0b1220; color: #93c5fd;
               border: 1px solid #334155; border-radius: 8px; padding: 8px; font: 12px/1.4 monospace; }
    code { background: #0b1220; border-radius: 5px; padding: 1px 6px; }
    .hidden { display: none; }
    a { color: #60a5fa; }
  </style>
</head>
<body>
  <header>
    <h1>Project Overseer</h1>
    <div class="sub" id="generated">Loading…</div>
  </header>
  <main>
    <div class="stats" id="stats"></div>

    <div class="card">
      <button id="enable">Enable weekly push notifications</button>
      <div id="notif-help" class="muted hidden" style="margin-top:12px"></div>
      <textarea id="sub" class="hidden" readonly></textarea>
    </div>

    <div class="card">
      <div class="meta muted">Latest digest</div>
      <div class="digest" id="digest">No run yet.</div>
    </div>

    <div id="timeline"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
