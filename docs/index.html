<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Project Overseer</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { font: 15px/1.55 -apple-system, system-ui, sans-serif; margin: 0;
           background: #0f172a; color: #e2e8f0;
           padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
           overflow-wrap: anywhere; }              /* never let long tokens overflow */
    header { padding: 22px 18px 10px; }
    header h1 { margin: 0; font-size: 19px; }
    header .sub { color: #94a3b8; font-size: 13px; margin-top: 2px; }
    main { padding: 8px 18px 40px; max-width: 780px; margin: 0 auto; }

    .stats { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0 18px; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 10px 14px; flex: 1; min-width: 70px; }
    .stat .n { font-size: 22px; font-weight: 700; }
    .stat .l { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 16px; margin: 12px 0; overflow: hidden; }   /* clip stray overflow */
    .section-label { font-size: 11px; color: #94a3b8; text-transform: uppercase;
                     letter-spacing: .05em; margin: 0 0 10px; }

    /* Readable digest: headings + bullet rows instead of one raw text blob */
    .digest h3 { font-size: 13px; letter-spacing: .04em; text-transform: uppercase;
                 color: #f8fafc; margin: 16px 0 6px; }
    .digest h3:first-child { margin-top: 0; }
    .digest ul { margin: 0; padding: 0; list-style: none; }
    .digest li { position: relative; padding: 6px 0 6px 16px; border-bottom: 1px solid #273449;
                 font-size: 14px; color: #cbd5e1; }
    .digest li:last-child { border-bottom: 0; }
    .digest li::before { content: "•"; position: absolute; left: 2px; color: #64748b; }
    .digest p { margin: 4px 0; color: #cbd5e1; }

    /* Agent group headers in the timeline — one per pipeline stage */
    .agent-head { display: flex; align-items: center; gap: 8px; margin: 22px 0 6px;
                  font-size: 12px; font-weight: 700; letter-spacing: .05em;
                  text-transform: uppercase; color: #e2e8f0;
                  padding-bottom: 6px; border-bottom: 1px solid #334155; }
    .agent-head:first-child { margin-top: 0; }
    .agent-head::before { content: ""; width: 9px; height: 9px; border-radius: 3px; background: #64748b; }
    .agent-head.bug-hunter::before { background: #f87171; }
    .agent-head.idea-agent::before { background: #fbbf24; }
    .agent-head.reviewer::before  { background: #34d399; }

    /* Timeline rows — label as a chip, detail wraps under it. Left border is
       tinted to the agent that produced the row. */
    .item { border-left: 3px solid #475569; padding: 8px 0 8px 12px; margin: 10px 0; min-width: 0; }
    .item.bug-hunter { border-left-color: #f87171; }
    .item.idea-agent { border-left-color: #fbbf24; }
    .item.reviewer  { border-left-color: #34d399; }
    .item .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
                  font-size: 11px; color: #94a3b8; }
    .chip { text-transform: uppercase; letter-spacing: .04em; font-weight: 600;
            font-size: 10px; padding: 2px 8px; border-radius: 999px;
            background: #334155; color: #cbd5e1; }
    .chip.idea { background: #78350f; color: #fde68a; }
    .chip.bug { background: #7f1d1d; color: #fecaca; }
    .chip.investigate { background: #1e3a8a; color: #bfdbfe; }
    .chip.search { background: #334155; color: #cbd5e1; }
    .chip.digest { background: #064e3b; color: #6ee7b7; }
    .chip.error { background: #7f1d1d; color: #fecaca; }
    .item .body { font-size: 13.5px; color: #cbd5e1; margin-top: 4px; }

    /* Per-project health (blind-spot tracking) */
    .prow { display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 9px 0; border-bottom: 1px solid #273449; }
    .prow:last-child { border-bottom: 0; }
    .prow .pname { font-size: 14px; }
    .prow .pmeta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .pbadge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
              padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
    .pbadge.ok { background: #064e3b; color: #6ee7b7; }
    .pbadge.idle { background: #713f12; color: #fde68a; }
    .pbadge.blind { background: #7c2d12; color: #fed7aa; }
    .pbadge.error { background: #7f1d1d; color: #fecaca; }
    .prow.alert .pmeta { color: #f59e0b; }
    .prow .pright { display: flex; align-items: center; gap: 10px; }

    /* Trend sparklines (week over week) */
    .spark { display: block; opacity: .9; }
    .trow { display: flex; align-items: center; gap: 10px; padding: 9px 0;
            border-bottom: 1px solid #273449; }
    .trow:last-of-type { border-bottom: 0; }
    .trow .tlabel { font-size: 13px; color: #cbd5e1; flex: 1; }
    .trow .tlast { font-size: 14px; font-weight: 700; min-width: 24px; text-align: right; }
    .trow .tnone { color: #64748b; }
    .trange { font-size: 11px; color: #94a3b8; margin-top: 8px; }

    button { font: inherit; background: #2563eb; color: #fff; border: 0; border-radius: 10px;
             padding: 12px 16px; width: 100%; cursor: pointer; }
    .muted { color: #94a3b8; font-size: 13px; }
    textarea { width: 100%; min-height: 110px; background: #0b1220; color: #93c5fd;
               border: 1px solid #334155; border-radius: 8px; padding: 8px;
               font: 12px/1.4 monospace; }
    code { background: #0b1220; border-radius: 5px; padding: 1px 6px; word-break: break-all; }
    .hidden { display: none; }
    a { color: #60a5fa; }
  </style>
</head>
<body>
  <header>
    <h1>Project Overseer</h1>
    <div class="sub">Three-agent weekly review · Bug-Hunter · Idea · Reviewer</div>
    <div class="sub" id="generated">Loading…</div>
  </header>
  <main>
    <div class="stats" id="stats"></div>

    <div class="card">
      <button id="enable">Enable weekly push notifications</button>
      <div id="notif-help" class="muted hidden" style="margin-top:12px"></div>
      <textarea id="sub" class="hidden" readonly></textarea>
    </div>

    <div class="card" id="projects-card" style="display:none">
      <div class="section-label">Project health</div>
      <div id="projects"></div>
    </div>

    <div class="card" id="trends-card" style="display:none">
      <div class="section-label">Trends (week over week)</div>
      <div id="trends"></div>
    </div>

    <div class="card">
      <div class="section-label">Latest digest</div>
      <div class="digest" id="digest">No run yet.</div>
    </div>

    <div class="card">
      <div class="section-label">What the agents did — Bug-Hunter → Idea → Reviewer</div>
      <div id="timeline"></div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
