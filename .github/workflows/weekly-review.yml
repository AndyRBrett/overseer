name: Weekly Project Review

on:
  schedule:
    # 14:00 UTC every Monday. Adjust to taste (cron is in UTC).
    - cron: "0 14 * * 1"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  overseer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run overseer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OVERSEER_GITHUB_TOKEN: ${{ secrets.OVERSEER_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Project repo slugs + data sources (set the ones you have):
          TRADING_REPO: ${{ vars.TRADING_REPO }}
          VOLLEYBALL_REPO: ${{ vars.VOLLEYBALL_REPO }}
          UFC_REPO: ${{ vars.UFC_REPO }}
          TRADING_DB_PATH: ${{ vars.TRADING_DB_PATH }}
          VOLLEYBALL_RESULTS_PATH: ${{ vars.VOLLEYBALL_RESULTS_PATH }}
        run: python project_overseer.py

      - name: Upload run report
        if: always()   # keep the visual even when the run fails — that's when you need it
        uses: actions/upload-artifact@v4
        with:
          name: overseer-report
          path: |
            overseer_report.html
            overseer_run.jsonl
          if-no-files-found: ignore
