name: Weekly Project Review

on:
  schedule:
    # 14:00 UTC every Monday. Adjust to taste (cron is in UTC).
    - cron: "0 14 * * 1"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Needed so the run can commit the updated digest back into docs/ (GitHub Pages).
permissions:
  contents: write

jobs:
  overseer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run overseer pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OVERSEER_GITHUB_TOKEN: ${{ secrets.OVERSEER_GITHUB_TOKEN }}
          # Project repo slugs + data sources (set the ones you have):
          TRADING_REPO: ${{ vars.TRADING_REPO }}
          VOLLEYBALL_REPO: ${{ vars.VOLLEYBALL_REPO }}
          UFC_REPO: ${{ vars.UFC_REPO }}
          TRADING_DB_PATH: ${{ vars.TRADING_DB_PATH }}
          VOLLEYBALL_RESULTS_PATH: ${{ vars.VOLLEYBALL_RESULTS_PATH }}
          # Agent 3 (Reviewer) delivers the digest to Telegram and/or a Slack
          # incoming webhook (all optional — each reports "not_configured" and the
          # run still succeeds if unset).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python orchestrator.py

      - name: Publish digest to the web app
        run: |
          if git diff --quiet -- docs/digest.json docs/history.json; then
            echo "No digest change to publish."
          else
            git config user.name  "overseer-bot"
            git config user.email "overseer-bot@users.noreply.github.com"
            git add docs/digest.json docs/history.json
            git commit -m "Weekly digest $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send push notification
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: python scripts/notify_push.py

      - name: Upload run report
        if: always()   # keep the visual even when the run fails — that's when you need it
        uses: actions/upload-artifact@v4
        with:
          name: overseer-report
          path: |
            overseer_report.html
            overseer_run.jsonl
          if-no-files-found: ignore
