# TEMPORARY SCAFFOLDING — delete before merging.
#
# Validates the Fixer stage from the feature branch: runs the full pipeline in
# --dry-run mode (every mutating tool intercepted and printed; the Fixer still
# clones, investigates, edits, tests, and commits locally). Push-triggered
# because dispatching weekly-review.yml requires actions:write, which the
# session driving this validation doesn't have. The real workflow gained a
# proper workflow_dispatch dry_run input for future use.
name: Dry Run (Fixer validation)

on:
  push:
    branches: [claude/overseer-auto-fix-fef9c2]

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run overseer pipeline (dry run)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OVERSEER_GITHUB_TOKEN: ${{ secrets.OVERSEER_GITHUB_TOKEN }}
          TRADING_REPO: ${{ vars.TRADING_REPO }}
          VOLLEYBALL_REPO: ${{ vars.VOLLEYBALL_REPO }}
          UFC_REPO: ${{ vars.UFC_REPO }}
          TRADING_DB_PATH: ${{ vars.TRADING_DB_PATH }}
          VOLLEYBALL_RESULTS_PATH: ${{ vars.VOLLEYBALL_RESULTS_PATH }}
        run: python orchestrator.py --dry-run

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overseer-dry-run-report
          path: |
            overseer_report.html
            overseer_run.jsonl
          if-no-files-found: ignore
